# ~/.gemini/commands/extract.toml

description = "Extracts structured test data (questions and answers) from educational PDFs or text sources into JSON for the learning app."

# Named arguments (dynamic)
# Example usage:
# /extract --args.file="inputs/mytest.pdf"
# /extract --args.file="@inputs/lesson1.pdf" --args.category="nursing" --args.out="outputs/tests.json"

prompt = """
You are a data extraction assistant specialized in transforming educational test materials into structured JSON format for the app.

### Input
The input file(s) are provided here:
- File path(s): {{args.file}}
- Category (optional): {{args.category}}
- Output path (optional): {{args.out}}

Read and analyze the provided document(s). Extract all test questions and their answer options.

### Output
Produce **only** a JSON array following this structure:

[
  {
    "id": "<uuid v4>",
     "meta": {
            "course": "pielegniarstwo",
            "category": "{{args.category}}"
        },
    "data": {
      "question": "<question text>",
      "answers": [
        {"option": "<choice text>", "isCorrect": true|false},
        {"option": "<choice text>", "isCorrect": true|false}
        {"option": "<choice text>", "isCorrect": true|false}
        {"option": "<choice text>", "isCorrect": true|false}
      ]
    },
    "createdAt": "<YYYY-MM-DD HH:MM:SS.micro>",
    "updatedAt": null
  },
  ...
]

### Rules
1. Preserve the exact question wording.
2. If an answer key is visible, mark correct options as isCorrect = true.
3. If uncertain, mark all as false and append "NOTE: uncertain" to the question.
4. Normalize diacritics, spacing, and punctuation.
5. Return **only JSON**, no explanations or commentary.

### Behavior
- You may use available tools such as `read` and `search` to inspect referenced content via {{args.file}}.
- If multiple files are provided (e.g. `@file1.pdf @file2.docx`), combine all extracted questions into one JSON array.
- If {{args.out}} is specified, prepare the JSON that could be saved to that file path.

Respond with the **final structured JSON output only**.
"""
